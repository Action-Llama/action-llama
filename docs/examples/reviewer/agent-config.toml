credentials = ["github_token", "git_ssh"]
schedule = "0 * * * *"
scale = 4
timeout = 1800

[[webhooks]]
source = "github"
orgs = ["your-org"]
events = ["pull_request"]
actions = ["opened", "synchronize", "ready_for_review"]

[[webhooks]]
source = "github"
orgs = ["your-org"]
events = ["check_suite"]
actions = ["completed"]

[params]
# Organization to monitor during scheduled runs (webhook runs use repo from trigger)
org = "your-org"
author = "your-github-username"
