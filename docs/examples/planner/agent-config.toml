credentials = ["github_token", "git_ssh"]
schedule = "0 * * * *"
timeout = 600
scale = 1

[model]
provider = "anthropic"
model = "claude-opus-4-20250514"
thinkingLevel = "xhigh"
authType = "api_key"

[[webhooks]]
source = "github"
orgs = ["your-org"]
events = ["issues"]
actions = ["labeled"]
labels = ["plan"]
author = "your-github-username"

[[webhooks]]
source = "github"
orgs = ["your-org"]
events = ["issue_comment"]
actions = ["created"]
labels = ["plan"]
author = "your-github-username"

[params]
org = "your-org"
triggerLabel = "plan"
author = "your-github-username"
