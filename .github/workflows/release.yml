name: Release

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Check for changesets
        id: has-changesets
        run: |
          if ls .changeset/*.md 1>/dev/null 2>&1 && [ "$(ls .changeset/*.md | grep -v README.md)" ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
            echo "No changesets found — skipping release."
          fi

      - run: npm ci
        if: steps.has-changesets.outputs.has_changesets == 'true'
      - run: npm run build
        if: steps.has-changesets.outputs.has_changesets == 'true'
      - run: npm test
        if: steps.has-changesets.outputs.has_changesets == 'true'

      - name: Version packages
        if: steps.has-changesets.outputs.has_changesets == 'true'
        id: version
        run: |
          npx changeset version
          VERSION=$(node -p "require('./packages/action-llama/package.json').version")
          echo "new_version=$VERSION" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        if: steps.has-changesets.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "release: version packages"
          git pull --rebase origin main
          git push

      - name: Rebuild after version bump
        if: steps.has-changesets.outputs.has_changesets == 'true'
        run: npm run build

      - name: Check which packages need publishing
        if: steps.has-changesets.outputs.has_changesets == 'true'
        id: check-versions
        run: |
          AL_VERSION=$(node -p "require('./packages/action-llama/package.json').version")
          SKILL_VERSION=$(node -p "require('./packages/skill/package.json').version")

          if npm view "@action-llama/action-llama@${AL_VERSION}" version >/dev/null 2>&1; then
            echo "action_llama_exists=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  @action-llama/action-llama@${AL_VERSION} already on npm — skipping"
          else
            echo "action_llama_exists=false" >> "$GITHUB_OUTPUT"
            echo "📦 @action-llama/action-llama@${AL_VERSION} will be published"
          fi

          if npm view "@action-llama/skill@${SKILL_VERSION}" version >/dev/null 2>&1; then
            echo "skill_exists=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  @action-llama/skill@${SKILL_VERSION} already on npm — skipping"
          else
            echo "skill_exists=false" >> "$GITHUB_OUTPUT"
            echo "📦 @action-llama/skill@${SKILL_VERSION} will be published"
          fi

      # Dry-run gate: intentionally fails the entire workflow if any package
      # can't be published. We want to catch registry issues (missing package,
      # bad token, etc.) before the real publish commits us to a partial release.
      # Skips packages whose version is already on npm (idempotent re-runs).
      - name: Dry-run publish (all packages)
        if: steps.has-changesets.outputs.has_changesets == 'true' && (steps.check-versions.outputs.action_llama_exists != 'true' || steps.check-versions.outputs.skill_exists != 'true')
        run: |
          if [ "${{ steps.check-versions.outputs.action_llama_exists }}" != "true" ]; then
            npm publish -w packages/action-llama --access public --tag latest --dry-run
          fi
          if [ "${{ steps.check-versions.outputs.skill_exists }}" != "true" ]; then
            npm publish -w packages/skill --access public --tag latest --dry-run
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @action-llama/action-llama
        if: steps.has-changesets.outputs.has_changesets == 'true' && steps.check-versions.outputs.action_llama_exists != 'true'
        run: npm publish -w packages/action-llama --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @action-llama/skill
        if: steps.has-changesets.outputs.has_changesets == 'true' && steps.check-versions.outputs.skill_exists != 'true'
        continue-on-error: true
        run: npm publish -w packages/skill --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Job summary
        if: always()
        run: |
          if [ "${{ steps.has-changesets.outputs.has_changesets }}" = "true" ]; then
            SKILL_VERSION=$(node -p "require('./packages/skill/package.json').version")
            echo "## Released packages" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- \`@action-llama/skill@${SKILL_VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- \`@action-llama/action-llama@${{ steps.version.outputs.new_version }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Published to npm with the \`latest\` dist-tag." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## No new changes" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No changesets found — nothing to release." >> "$GITHUB_STEP_SUMMARY"
          fi
