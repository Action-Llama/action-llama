name: Release

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Check for changesets
        id: has-changesets
        run: |
          if ls .changeset/*.md 1>/dev/null 2>&1 && [ "$(ls .changeset/*.md | grep -v README.md)" ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
            echo "No changesets found — skipping release."
          fi

      - run: npm ci
        if: steps.has-changesets.outputs.has_changesets == 'true'
      - run: npm run build
        if: steps.has-changesets.outputs.has_changesets == 'true'
      - run: npm test
        if: steps.has-changesets.outputs.has_changesets == 'true'

      - name: Version packages
        if: steps.has-changesets.outputs.has_changesets == 'true'
        id: version
        run: |
          npx changeset version
          VERSION=$(node -p "require('./packages/action-llama/package.json').version")
          echo "new_version=$VERSION" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        if: steps.has-changesets.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "release: version packages"
          git pull --rebase origin main
          git push

      - name: Publish to npm
        if: steps.has-changesets.outputs.has_changesets == 'true'
        run: npm publish -w packages/action-llama --access public --tag next

      - name: Job summary
        if: always()
        run: |
          if [ "${{ steps.has-changesets.outputs.has_changesets }}" = "true" ]; then
            echo "## Released \`@action-llama/action-llama@${{ steps.version.outputs.new_version }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Published to npm with the \`next\` dist-tag." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## No new changes" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No changesets found — nothing to release." >> "$GITHUB_STEP_SUMMARY"
          fi
