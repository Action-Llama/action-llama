name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies (with retry)
        run: |
          for i in {1..3}; do
            echo "Install attempt $i"
            if npm ci; then
              echo "Dependencies installed successfully"
              break
            else
              echo "Install failed on attempt $i"
              if [ $i -eq 3 ]; then
                echo "All install attempts failed"
                exit 1
              fi
              echo "Retrying in 5 seconds..."
              sleep 5
            fi
          done

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Verify dependencies
        run: |
          if [ ! -d "node_modules" ]; then
            echo "Cache miss - installing dependencies"
            npm ci
          fi

      - name: Build project
        run: |
          echo "Starting build process..."
          npm run build
          echo "Build completed successfully"

      - name: Cache build artifacts
        uses: actions/cache/save@v4
        with:
          path: |
            packages/*/dist
            packages/shared/dist
          key: ${{ runner.os }}-build-${{ github.sha }}

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [install, build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/*/dist
            packages/shared/dist
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Verify dependencies and build
        run: |
          if [ ! -d "node_modules" ]; then
            echo "Dependencies missing - installing"
            npm ci
          fi
          if [ ! -d "packages/shared/dist" ] || [ ! -d "packages/action-llama/dist" ]; then
            echo "Build artifacts missing - rebuilding"
            npm run build
          fi

      - name: Run tests with verbose output
        run: |
          echo "Starting test suite..."
          npm test -- --reporter=verbose
          echo "All tests completed successfully"

      - name: Test summary
        if: always()
        run: |
          echo "Test job completed with status: ${{ job.status }}"
