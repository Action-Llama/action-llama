name: Promote to latest

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to promote (e.g. 0.4.3). Leave blank to promote the current 'next' tag."
        required: false

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(npm view @action-llama/action-llama dist-tags.next)
            if [ -z "$VERSION" ]; then
              echo "::error::No version found on the 'next' dist-tag"
              exit 1
            fi
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Promote to latest
        run: npm dist-tag add @action-llama/action-llama@${{ steps.version.outputs.version }} latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: echo "Promoted @action-llama/action-llama@${{ steps.version.outputs.version }} to latest"
